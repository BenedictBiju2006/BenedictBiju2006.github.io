<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Benedict — Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
      background-size: 600% 600%;
      animation: gradientShift 12s ease infinite;
      color: #ffffff;
      overflow: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .content {
      text-align: center;
    }

    h1 {
      font-size: clamp(3rem, 6vw, 5rem);
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.85;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* Subtle floating dots animation */
    .dot {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      animation: floatUp 10s linear infinite;
    }

    @keyframes floatUp {
      from {
        transform: translateY(100vh);
        opacity: 0;
      }
      to {
        transform: translateY(-10vh);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Benedict</h1>
    <p>Coming Soon</p>
  </div>

  <!-- Floating dots -->
  <div class="dot" style="left:10%; animation-duration: 12s;"></div>
  <div class="dot" style="left:30%; animation-duration: 9s;"></div>
  <div class="dot" style="left:50%; animation-duration: 14s;"></div>
  <div class="dot" style="left:70%; animation-duration: 11s;"></div>
  <div class="dot" style="left:85%; animation-duration: 10s;"></div>
</body>
</html>
